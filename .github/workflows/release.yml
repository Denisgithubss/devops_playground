name: Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Need this to create a release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: 'v3.14.0' # Specify the Helm version you want

      - name: Prepare build directory
        run: mkdir -p build

      - name: Package Helm Chart
        run: |
          helm package helm/demo-app -d build/
          echo "Packaged Helm Chart"

      - name: Render Kubernetes Manifests
        run: |
          helm template demo-app helm/demo-app -f helm/demo-app/values.yaml > build/k8s-manifests.yaml
          echo "Rendered Kubernetes Manifests"

      - name: Package Security Policies
        run: |
          tar -czvf build/devsecops-policies.tar.gz k8s/kyverno-policies k8s/networkpolicy.yaml
          echo "Packaged Security Policies"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/demo-app-*.tgz
            build/k8s-manifests.yaml
            build/devsecops-policies.tar.gz
          draft: true
          generate_release_notes: true
          body: |
            Initial draft release for DevSecOps Portfolio Lab.

            This release includes:
            - **Helm Chart:** The packaged `demo-app` chart.
            - **Kubernetes Manifests:** Rendered manifests based on default values.
            - **Security Policies:** Archive containing Kyverno policies and NetworkPolicies.

            *(Note: The container image is built and scanned during CI but not pushed to a registry in this lab environment.)*

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Denisgithubss/devops_playground.git
    targetRevision: HEAD
    path: helm/demo-app
  destination:
    server: https://kubernetes.default.svc
    namespace: devops-lab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

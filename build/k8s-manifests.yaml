---
# Source: demo-app/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app
  labels:
    helm.sh/chart: demo-app-0.1.0
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: demo-app
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
data:
  welcome.message: "Welcome to the DevOps Portfolio Lab (from Helm)"
---
# Source: demo-app/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  labels:
    helm.sh/chart: demo-app-0.1.0
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: demo-app
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: demo-app
---
# Source: demo-app/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  labels:
    helm.sh/chart: demo-app-0.1.0
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: demo-app
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-app
      app.kubernetes.io/instance: demo-app
  template:
    metadata:
      annotations:
        checksum/config: 142a3dfad342aa815aaafce6357b07b3cdd598fde5d6fb68d3c2b36fc21575c7
      labels:
        app.kubernetes.io/name: demo-app
        app.kubernetes.io/instance: demo-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: demo-app
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
          image: "demo-app:latest"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          env:
            - name: WELCOME_MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: demo-app
                  key: welcome.message
